#
# handling systemd on target.
---

units:
   - name: "NetworkManager"
     action: "enable"
     mandatory: false

   - name: "cups"
     action: "enable"
     mandatory: false

   - name: "avahi-daemon"
     action: "enable"
     mandatory: false

   - name: "systemd-timesyncd"
     action: "enable"
     mandatory: false

   - name: "ufw"
     action: "enable"
     mandatory: false

   - name: "fstrim.timer"
     action: "enable"
     mandatory: false

   - name: "bluetooth"
     action: "enable"
     mandatory: false

   - name: "plasmalogin"
     action: "enable"
     mandatory: false

   - name: "graphical.target"
     action: "enable"
     mandatory: false
